<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postal Time Master + Log</title>
    <style>
        :root { --usps-blue: #004B87; --usps-red: #E71921; }
        body { font-family: sans-serif; background: #f0f2f5; padding: 10px; }
        .card { background: white; width: 100%; max-width: 480px; margin: auto; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); border-top: 10px solid var(--usps-blue); }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        label { font-size: 0.8rem; font-weight: bold; color: var(--usps-blue); display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .btn-save { width: 100%; background: #28a745; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .log-section { margin-top: 25px; border-top: 2px solid #eee; pt: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 10px; }
        th { background: #eee; text-align: left; padding: 8px; }
        td { border-bottom: 1px solid #eee; padding: 8px; }
        .clear-btn { font-size: 0.7rem; color: var(--usps-red); cursor: pointer; float: right; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center; color:var(--usps-blue);">USPS Time Tracker</h2>
    
    <div class="input-row">
        <div><label>BT</label><input type="time" id="bt" oninput="calculate()"></div>
        <div><label>OL</label><input type="time" id="ol" oninput="calculate()"></div>
    </div>
    <div class="input-row">
        <div><label>IL</label><input type="time" id="il" oninput="calculate()"></div>
        <div><label>ET</label><input type="time" id="et" oninput="calculate()"></div>
    </div>

    <div style="background:#f9f9f9; padding:10px; border-radius:8px;">
        <div style="display:flex; justify-content:space-between;">
            <span>Worked Units:</span><span id="total_w" style="font-weight:bold;">0.00</span>
        </div>
        <div id="rem_display" style="text-align:center; font-weight:900; color:var(--usps-red); margin-top:10px;">8.00 REMAINING</div>
    </div>

    <button class="btn-save" onclick="saveShift()">💾 Save to Weekly Log</button>

    <div class="log-section">
        <span class="clear-btn" onclick="clearLog()">Clear All</span>
        <h3 style="margin:0;">Weekly Log</h3>
        <table id="logTable">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>BT</th>
                    <th>ET</th>
                    <th>Units</th>
                </tr>
            </thead>
            <tbody id="logBody"></tbody>
        </table>
    </div>
</div>

<script>
    const chart = [.00, .02, .03, .05, .07, .08, .10, .12, .13, .15, .17, .18, .20, .22, .23, .25, .27, .28, .30, .32, .33, .35, .37, .38, .40, .42, .43, .45, .47, .48, .50, .52, .53, .55, .57, .58, .60, .62, .63, .65, .67, .68, .70, .72, .73, .75, .77, .78, .80, .82, .83, .85, .87, .88, .90, .92, .93, .95, .97, .98, 1.00];

    function getVal(id) {
        const val = document.getElementById(id).value;
        if (!val) return 0;
        const [h, m] = val.split(':').map(Number);
        return h + chart[m];
    }

    function calculate() {
        const bt = getVal('bt'), ol = getVal('ol'), il = getVal('il'), et = getVal('et');
        const worked = ((ol > bt ? ol - bt : 0) + (et > il ? et - il : 0));
        const remain = 8.00 - worked;
        document.getElementById('total_w').innerText = worked.toFixed(2);
        const rDisp = document.getElementById('rem_display');
        rDisp.innerText = remain > 0 ? remain.toFixed(2) + " REMAINING" : "OVERTIME: " + Math.abs(remain).toFixed(2);
        rDisp.style.color = remain < 0 ? "green" : "var(--usps-red)";
    }

    function saveShift() {
        const entry = {
            date: new Date().toLocaleDateString(),
            bt: document.getElementById('bt').value,
            et: document.getElementById('et').value,
            units: document.getElementById('total_w').innerText
        };
        if (entry.units === "0.00") return alert("Enter times first!");
        
        let history = JSON.parse(localStorage.getItem('usps_log')) || [];
        history.push(entry);
        localStorage.setItem('usps_log', JSON.stringify(history));
        renderLog();
    }

    function renderLog() {
        const history = JSON.parse(localStorage.getItem('usps_log')) || [];
        const body = document.getElementById('logBody');
        body.innerHTML = history.map(h => `<tr><td>${h.date}</td><td>${h.bt}</td><td>${h.et}</td><td><b>${h.units}</b></td></tr>`).join('');
    }

    function clearLog() {
        if(confirm("Clear all history?")) {
            localStorage.removeItem('usps_log');
            renderLog();
        }
    }

    // Load log on start
    renderLog();
</script>
</body>
</html>
