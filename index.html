<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USPS Pro Time Master</title>
    <style>
        :root { --usps-blue: #004B87; --usps-red: #E71921; --gray-bg: #f4f7f9; }
        body { font-family: -apple-system, sans-serif; background: #e0e4e8; padding: 10px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 480px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); border-top: 12px solid var(--usps-blue); }
        
        h2 { text-align: center; color: var(--usps-blue); margin-bottom: 5px; }
        .sub-text { text-align: center; font-size: 0.8rem; color: #666; margin-bottom: 20px; }

        /* Mode Toggle Styling */
        .mode-container { display: flex; align-items: center; justify-content: center; background: var(--gray-bg); padding: 12px; border-radius: 50px; margin-bottom: 25px; border: 1px solid #ddd; }
        .mode-text { font-size: 0.85rem; font-weight: bold; margin: 0 12px; color: #444; }
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--usps-blue); transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #555; }
        input:checked + .slider:before { transform: translateX(22px); }

        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 0.75rem; font-weight: 800; color: var(--usps-blue); margin-bottom: 5px; text-transform: uppercase; }
        input { padding: 12px; border: 2px solid #edf0f2; border-radius: 10px; font-size: 1rem; transition: 0.2s; background: #fafbfc; }
        input:focus { border-color: var(--usps-blue); outline: none; background: #fff; }

        .results-box { background: #f0f4f8; padding: 20px; border-radius: 15px; margin-top: 20px; text-align: center; border: 1px solid #d1d9e0; }
        .total-worked { font-size: 2.2rem; font-weight: 900; color: var(--usps-blue); line-height: 1; }
        .worked-label { font-size: 0.8rem; color: #666; font-weight: bold; margin-bottom: 10px; }
        .remaining-status { font-size: 1.3rem; font-weight: 800; color: var(--usps-red); margin-top: 15px; padding-top: 15px; border-top: 1px dashed #ccc; }

        .save-btn { width: 100%; background: #28a745; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 0 #1e7e34; }
        .save-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #1e7e34; }

        /* Log Styling */
        .history { margin-top: 30px; }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .history-header h3 { margin: 0; font-size: 1rem; color: #444; }
        .clear-link { font-size: 0.7rem; color: var(--usps-red); text-decoration: underline; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; font-size: 0.85rem; }
        th { background: #eee; padding: 10px; text-align: left; color: #555; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="card">
    <h2>📬 USPS Time Master</h2>
    <p class="sub-text">Tour 1, 2, & 3 Compatible | Notice 30 Certified</p>

    <div class="mode-container">
        <span class="mode-text">Clock (12h)</span>
        <label class="switch">
            <input type="checkbox" id="modeToggle" onchange="toggleInputMode()">
            <span class="slider"></span>
        </label>
        <span class="mode-text">Postal (100u)</span>
    </div>

    <div class="input-row">
        <div class="input-group"><label>Begin Tour (BT)</label><input type="time" id="bt" oninput="calculate()"></div>
        <div class="input-group"><label>Out Lunch (OL)</label><input type="time" id="ol" oninput="calculate()"></div>
    </div>
    <div class="input-row">
        <div class="input-group"><label>In Lunch (IL)</label><input type="time" id="il" oninput="calculate()"></div>
        <div class="input-group"><label>End Tour (ET)</label><input type="time" id="et" oninput="calculate()"></div>
    </div>

    <div class="results-box">
        <div class="worked-label">TOTAL WORKED UNITS</div>
        <div id="total_display" class="total-worked">0.00</div>
        <div id="status_display" class="remaining-status">8.00 REMAINING</div>
    </div>

    <button class="save-btn" onclick="saveShift()">💾 SAVE SHIFT TO LOG</button>

    <div class="history">
        <div class="history-header">
            <h3>Recent Activity</h3>
            <span class="clear-link" onclick="clearData()">Clear All</span>
        </div>
        <table id="logTable">
            <thead>
                <tr><th>Date</th><th>BT</th><th>ET</th><th>Units</th></tr>
            </thead>
            <tbody id="logBody"></tbody>
        </table>
    </div>
</div>

<script>
    // OFFICIAL NOTICE 30 CONVERSION CHART (0-60 minutes)
    const CHART = [.00, .02, .03, .05, .07, .08, .10, .12, .13, .15, .17, .18, .20, .22, .23, .25, .27, .28, .30, .32, .33, .35, .37, .38, .40, .42, .43, .45, .47, .48, .50, .52, .53, .55, .57, .58, .60, .62, .63, .65, .67, .68, .70, .72, .73, .75, .77, .78, .80, .82, .83, .85, .87, .88, .90, .92, .93, .95, .97, .98, 1.00];

    function toggleInputMode() {
        const isPostal = document.getElementById('modeToggle').checked;
        ['bt','ol','il','et'].forEach(id => {
            const el = document.getElementById(id);
            el.type = isPostal ? "number" : "time";
            el.step = isPostal ? "0.01" : "";
            el.placeholder = isPostal ? "00.00" : "";
            el.value = "";
        });
        calculate();
    }

    function getVal(id) {
        const el = document.getElementById(id);
        const isPostal = document.getElementById('modeToggle').checked;
        if (!el.value) return 0;
        if (isPostal) return parseFloat(el.value);
        const [h, m] = el.value.split(':').map(Number);
        return h + CHART[m];
    }

    function calculate() {
        let bt = getVal('bt'), ol = getVal('ol'), il = getVal('il'), et = getVal('et');

        // CROSSOVER LOGIC (Tour 1 & 3)
        // If a subsequent entry is smaller than the previous, we add 24 hours.
        if (ol !== 0 && ol < bt) ol += 24;
        if (il !== 0 && il < ol) il += 24;
        if (et !== 0 && et < (il || bt)) et += 24;

        let worked = 0;
        if (bt > 0 && et > 0) {
            let lunch = (il > ol) ? (il - ol) : 0;
            worked = (et - bt) - lunch;
        }

        const remain = 8.00 - worked;
        document.getElementById('total_display').innerText = worked.toFixed(2);
        
        const status = document.getElementById('status_display');
        if (worked > 0) {
            status.innerText = remain > 0 ? remain.toFixed(2) + " REMAINING" : "OVERTIME: " + Math.abs(remain).toFixed(2);
            status.style.color = remain < 0 ? "#28a745" : "var(--usps-red)";
        } else {
            status.innerText = "8.00 REMAINING";
            status.style.color = "var(--usps-red)";
        }
    }

    function saveShift() {
        const units = document.getElementById('total_display').innerText;
        if (units === "0.00") return alert("Enter times first!");
        
        const entry = {
            date: new Date().toLocaleDateString(),
            bt: document.getElementById('bt').value || "--",
            et: document.getElementById('et').value || "--",
            units: units
        };

        let log = JSON.parse(localStorage.getItem('usps_pro_log')) || [];
        log.unshift(entry); // Newest first
        localStorage.setItem('usps_pro_log', JSON.stringify(log.slice(0, 14))); // Keep 2 weeks
        renderLog();
    }

    function renderLog() {
        const log = JSON.parse(localStorage.getItem('usps_pro_log')) || [];
        document.getElementById('logBody').innerHTML = log.map(h => `
            <tr><td>${h.date}</td><td>${h.bt}</td><td>${h.et}</td><td><b>${h.units}</b></td></tr>
        `).join('');
    }

    function clearData() {
        if(confirm("Clear shift history?")) {
            localStorage.removeItem('usps_pro_log');
            renderLog();
        }
    }

    renderLog(); // Initial load
</script>
</body>
</html>
</body>
</html>
