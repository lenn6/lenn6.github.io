<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postal Pro Time Tracker</title>
    <style>
        :root { --usps-blue: #004B87; --usps-red: #E71921; }
        body { font-family: sans-serif; background: #f0f2f5; padding: 10px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 450px; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); border-top: 10px solid var(--usps-blue); }
        .mode-toggle { background: #eee; padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 20px; font-weight: bold; cursor: pointer; border: 2px solid #ddd; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        label { font-size: 0.8rem; font-weight: bold; color: var(--usps-blue); display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        .duration-line { font-size: 0.85rem; color: #555; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .summary { background: var(--usps-blue); color: white; padding: 15px; border-radius: 8px; margin-top: 15px; }
        .stat { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .remain-box { background: white; color: var(--usps-red); padding: 15px; border-radius: 8px; text-align: center; font-size: 1.5rem; font-weight: 900; margin-top: 15px; border: 3px solid var(--usps-red); }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center; color:var(--usps-blue);">Official Time Tracker</h2>
    
    <div class="mode-toggle" id="modeBtn" onclick="toggleMode()">MODE: Standard (12hr)</div>

    <div class="input-row">
        <div><label>BT</label><input type="time" id="bt" oninput="calculate()"></div>
        <div><label>OL</label><input type="time" id="ol" oninput="calculate()"></div>
    </div>
    <div class="duration-line">AM Total: <span id="am_d">0.00</span></div>

    <div class="input-row">
        <div><label>IL</label><input type="time" id="il" oninput="calculate()"></div>
        <div><label>ET</label><input type="time" id="et" oninput="calculate()"></div>
    </div>
    <div class="duration-line">PM Total: <span id="pm_d">0.00</span> | Lunch: <span id="l_d">0.00</span></div>

    <div class="summary">
        <div class="stat"><span>Worked Units:</span> <span id="total_w">0.00</span></div>
        <div class="stat" style="border-top: 1px solid #5a8bb5; pt: 5px; mt: 5px; font-weight: bold;"><span>Total Day:</span> <span id="total_d">0.00</span></div>
    </div>

    <div class="remain-box" id="rem_display">8.00 REMAINING</div>
</div>

<script>
    // THE OFFICIAL NOTICE 30 CHART VALUES
    const officialChart = [
        .00, .02, .03, .05, .07, .08, .10, .12, .13, .15, 
        .17, .18, .20, .22, .23, .25, .27, .28, .30, .32, 
        .33, .35, .37, .38, .40, .42, .43, .45, .47, .48, 
        .50, .52, .53, .55, .57, .58, .60, .62, .63, .65, 
        .67, .68, .70, .72, .73, .75, .77, .78, .80, .82, 
        .83, .85, .87, .88, .90, .92, .93, .95, .97, .98, 1.00
    ];

    let isPostal = false;

    function toggleMode() {
        isPostal = !isPostal;
        document.getElementById('modeBtn').innerText = isPostal ? "MODE: Postal (100 Unit)" : "MODE: Standard (12hr)";
        const inputs = ['bt', 'ol', 'il', 'et'];
        inputs.forEach(id => {
            const el = document.getElementById(id);
            el.value = "";
            el.type = isPostal ? "number" : "time";
        });
        calculate();
    }

    function getVal(id) {
        const el = document.getElementById(id);
        if (!el.value) return 0;
        if (isPostal) return parseFloat(el.value);
        
        const [h, m] = el.value.split(':').map(Number);
        // Use the official chart array instead of division
        const decimalMins = officialChart[m];
        return h + decimalMins;
    }

    function calculate() {
        const bt = getVal('bt'), ol = getVal('ol'), il = getVal('il'), et = getVal('et');
        const am = (ol > bt) ? (ol - bt) : 0;
        const lunch = (il > ol) ? (il - ol) : 0;
        const pm = (et > il) ? (et - il) : 0;
        const worked = am + pm;
        const remain = 8.00 - worked;

        document.getElementById('am_d').innerText = am.toFixed(2);
        document.getElementById('pm_d').innerText = pm.toFixed(2);
        document.getElementById('l_d').innerText = lunch.toFixed(2);
        document.getElementById('total_w').innerText = worked.toFixed(2);
        document.getElementById('total_d').innerText = (et > bt ? et - bt : 0).toFixed(2);
        
        const rBox = document.getElementById('rem_display');
        rBox.innerText = remain > 0 ? remain.toFixed(2) + " REMAINING" : "OVERTIME: " + Math.abs(remain).toFixed(2);
        rBox.style.color = remain < 0 ? "#28a745" : "var(--usps-red)";
    }
</script>
</body>
</html>
