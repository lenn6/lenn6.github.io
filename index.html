<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1e3a8a 0%, #172554 100%); /* Deep Blue */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            color: white;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
        }
        .accent-yellow { color: #facc15; } /* Bright Yellow */
        .btn-yellow {
            background-color: #facc15;
            color: #1e3a8a;
            transition: all 0.3s ease;
        }
        .btn-yellow:hover {
            background-color: #fde047;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(250, 204, 21, 0.3);
        }
    </style>
</head>
<body>

    <div class="glass-card p-8 md:p-12 max-w-lg w-full mx-4 text-center shadow-2xl">
        <h2 class="text-sm uppercase tracking-widest accent-yellow font-bold mb-4">Launching Soon</h2>
        <h1 class="text-4xl md:text-5xl font-extrabold mb-6">Something <span class="accent-yellow">Big</span> is Coming.</h1>
        <p class="text-blue-100 mb-8 leading-relaxed">
            I'm working hard to bring you the best projects. Stay tuned for updates and be the first to know when it go live.
        </p>

        <form action="#" class="space-y-4">
            <input type="email" placeholder="Enter your email" 
                class="w-full px-5 py-3 rounded-lg bg-blue-900/50 border border-blue-400/30 text-white placeholder-blue-300 focus:outline-none focus:ring-2 focus:ring-yellow-400">
            <button class="w-full btn-yellow font-bold py-3 rounded-lg uppercase tracking-wider">
                Notify Me
            </button>
        </form>

        <div class="mt-8 flex justify-center space-x-6 text-blue-300">
            <a href="#" class="hover:text-yellow-400 transition-colors">Twitter</a>
            <a href="#" class="hover:text-yellow-400 transition-colors">Instagram</a>
            <a href="#" class="hover:text-yellow-400 transition-colors">LinkedIn</a>
        </div>
    </div>

</body>
</html>
