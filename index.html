<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USPS Time & Duration Tracker</title>
    <style>
        :root { --usps-blue: #004B87; --usps-red: #E71921; --gray: #f4f4f4; }
        body { font-family: -apple-system, sans-serif; background: #eaeff2; padding: 15px; }
        .card { background: white; max-width: 450px; margin: auto; padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-left: 10px solid var(--usps-blue); }
        h2 { text-align: center; color: var(--usps-blue); margin-top: 0; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 0.75rem; font-weight: bold; color: #555; margin-bottom: 4px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }
        
        .duration-box { background: var(--gray); padding: 8px; border-radius: 6px; margin: 5px 0 15px 0; font-size: 0.85rem; border-left: 4px solid #ccc; }
        .duration-box span { font-weight: bold; color: var(--usps-blue); }

        .summary { background: var(--usps-blue); color: white; padding: 15px; border-radius: 8px; margin-top: 10px; }
        .stat { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .total-row { font-size: 1.2rem; border-top: 1px solid rgba(255,255,255,0.3); padding-top: 10px; margin-top: 10px; font-weight: bold; }
        .remaining-row { background: #fff; color: var(--usps-red); padding: 10px; border-radius: 5px; text-align: center; font-size: 1.3rem; margin-top: 15px; border: 2px solid var(--usps-red); }
    </style>
</head>
<body>

<div class="card">
    <h2>📬 USPS Duration Tracker</h2>

    <div class="input-row">
        <div class="input-group">
            <label>Begin Tour (BT)</label>
            <input type="time" id="bt" oninput="calculate()">
        </div>
        <div class="input-group">
            <label>Out Lunch (OL)</label>
            <input type="time" id="ol" oninput="calculate()">
        </div>
    </div>
    <div class="duration-box">AM Work Duration: <span id="dur_am">0.00</span> units</div>

    <div class="input-row">
        <div class="input-group">
            <label>In Lunch (IL)</label>
            <input type="time" id="il" oninput="calculate()">
        </div>
        <div class="input-group">
            <label>End Tour (ET)</label>
            <input type="time" id="et" oninput="calculate()">
        </div>
    </div>
    <div class="duration-box">PM Work Duration: <span id="dur_pm">0.00</span> units</div>
    <div class="duration-box" style="background: #fff0f0; border-left-color: var(--usps-red);">Lunch Break: <span id="dur_lunch">0.00</span> units</div>

    <div class="summary">
        <div class="stat"><span>Total Worked:</span> <span id="total_work">0.00</span></div>
        <div class="stat total-row"><span>Total Day Units:</span> <span id="total_day">0.00</span></div>
    </div>

    <div class="remaining-row" id="remaining">
        Remaining for 8hr: 8.00
    </div>
</div>

<script>
    function toDecimal(timeStr) {
        if (!timeStr) return null;
        const [h, m] = timeStr.split(':').map(Number);
        return h + (Math.round((m / 60) * 100) / 100);
    }

    function calculate() {
        const bt = toDecimal(document.getElementById('bt').value);
        const ol = toDecimal(document.getElementById('ol').value);
        const il = toDecimal(document.getElementById('il').value);
        const et = toDecimal(document.getElementById('et').value);

        let amWork = (ol && bt && ol > bt) ? (ol - bt) : 0;
        let pmWork = (et && il && et > il) ? (et - il) : 0;
        let lunch = (il && ol && il > ol) ? (il - ol) : 0;
        
        let totalWorked = amWork + pmWork;
        let totalDay = (et && bt) ? (et - bt) : 0;
        let remain = 8.00 - totalWorked;

        // Update UI
        document.getElementById('dur_am').innerText = amWork.toFixed(2);
        document.getElementById('dur_pm').innerText = pmWork.toFixed(2);
        document.getElementById('dur_lunch').innerText = lunch.toFixed(2);
        document.getElementById('total_work').innerText = totalWorked.toFixed(2);
        document.getElementById('total_day').innerText = totalDay.toFixed(2);
        
        const remainDisplay = document.getElementById('remaining');
        if (totalWorked > 0) {
            remainDisplay.innerText = "Remaining (8hr): " + Math.max(0, remain).toFixed(2) + " units";
            remainDisplay.style.color = remain < 0 ? "green" : "var(--usps-red)";
        } else {
            remainDisplay.innerText = "Enter BT & OL to start";
        }
    }
</script>

</body>
</html>

</body>
</html>
