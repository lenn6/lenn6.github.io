<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USPS Pro Time Tracker</title>
    <style>
        :root { --usps-blue: #004B87; --usps-red: #E71921; --light-bg: #f8f9fa; }
        body { font-family: -apple-system, sans-serif; background: #e9ecef; padding: 10px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 450px; padding: 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 10px solid var(--usps-blue); }
        
        /* The Switch Styling */
        .switch-container { display: flex; align-items: center; justify-content: center; background: var(--light-bg); padding: 10px; border-radius: 10px; margin-bottom: 20px; gap: 10px; border: 1px solid #ddd; }
        .switch-label { font-weight: bold; font-size: 0.9rem; color: var(--usps-blue); }
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--usps-blue); }
        input:checked + .slider:before { transform: translateX(26px); }

        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 10px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 0.75rem; font-weight: 800; color: #444; margin-bottom: 5px; }
        input { padding: 12px; border: 2px solid #eee; border-radius: 8px; font-size: 1rem; transition: 0.3s; }
        input:focus { border-color: var(--usps-blue); outline: none; }
        
        .duration { font-size: 0.8rem; color: #666; margin-bottom: 10px; padding-left: 5px; }
        .summary-box { background: var(--usps-blue); color: white; padding: 15px; border-radius: 12px; margin-top: 15px; }
        .stat { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .remaining { background: white; color: var(--usps-red); padding: 15px; border-radius: 8px; text-align: center; font-size: 1.4rem; font-weight: 900; margin-top: 15px; border: 2px solid var(--usps-red); }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center; color:var(--usps-blue); margin-bottom:5px;">🕒 USPS Time Master</h2>
    <p style="text-align:center; font-size:0.8rem; margin-top:0; color:#666;">Custom Built for Logistics Professionals</p>

    <div class="switch-container">
        <span class="switch-label">Standard (12hr)</span>
        <label class="switch">
            <input type="checkbox" id="modeSwitch" onchange="toggleMode()">
            <span class="slider"></span>
        </label>
        <span class="switch-label">Postal (100)</span>
    </div>

    <div id="inputsContainer">
        <div class="input-row">
            <div class="input-group">
                <label>Begin Tour (BT)</label>
                <input type="time" id="bt" oninput="calculate()">
            </div>
            <div class="input-group">
                <label>Out Lunch (OL)</label>
                <input type="time" id="ol" oninput="calculate()">
            </div>
        </div>
        <div class="duration">AM Segment: <span id="am_val">0.00</span></div>

        <div class="input-row">
            <div class="input-group">
                <label>In Lunch (IL)</label>
                <input type="time" id="il" oninput="calculate()">
            </div>
            <div class="input-group">
                <label>End Tour (ET)</label>
                <input type="time" id="et" oninput="calculate()">
            </div>
        </div>
        <div class="duration">PM Segment: <span id="pm_val">0.00</span> | Lunch: <span id="lunch_val">0.00</span></div>
    </div>

    <div class="summary-box">
        <div class="stat"><span>Worked Units:</span> <span id="total_work">0.00</span></div>
        <div class="stat" style="font-weight:bold; border-top:1px solid #5a8bb5; padding-top:5px;"><span>Total Elapsed:</span> <span id="total_day">0.00</span></div>
    </div>

    <div class="remaining" id="remaining">8.00 UNITS LEFT</div>
</div>

<script>
    function toggleMode() {
        const isPostal = document.getElementById('modeSwitch').checked;
        const inputs = ['bt', 'ol', 'il', 'et'];
        
        inputs.forEach(id => {
            const el = document.getElementById(id);
            el.value = ""; // Clear values when switching to prevent math errors
            el.type = isPostal ? "number" : "time";
            if(isPostal) {
                el.placeholder = "e.g. 08.50";
                el.step = "0.01";
            }
        });
        calculate();
    }

    function getVal(id) {
        const el = document.getElementById(id);
        const isPostal = document.getElementById('modeSwitch').checked;
        
        if (!el.value) return 0;

        if (isPostal) {
            return parseFloat(el.value);
        } else {
            const [h, m] = el.value.split(':').map(Number);
            return h + (Math.round((m / 60) * 100) / 100);
        }
    }

    function calculate() {
        const bt = getVal('bt');
        const ol = getVal('ol');
        const il = getVal('il');
        const et = getVal('et');

        const am = (ol > bt) ? (ol - bt) : 0;
        const lunch = (il > ol) ? (il - ol) : 0;
        const pm = (et > il) ? (et - il) : 0;
        const worked = am + pm;
        const elapsed = (et > bt) ? (et - bt) : 0;
        const remain = 8.00 - worked;

        document.getElementById('am_val').innerText = am.toFixed(2);
        document.getElementById('pm_val').innerText = pm.toFixed(2);
        document.getElementById('lunch_val').innerText = lunch.toFixed(2);
        document.getElementById('total_work').innerText = worked.toFixed(2);
        document.getElementById('total_day').innerText = elapsed.toFixed(2);
        
        const remEl = document.getElementById('remaining');
        if (worked > 0) {
            remEl.innerText = remain > 0 ? remain.toFixed(2) + " UNITS LEFT" : "OVERTIME: " + Math.abs(remain).toFixed(2);
            remEl.style.color = remain < 0 ? "#28a745" : "var(--usps-red)";
            remEl.style.borderColor = remain < 0 ? "#28a745" : "var(--usps-red)";
        } else {
            remEl.innerText = "8.00 UNITS LEFT";
        }
    }
</script>

</body>
</html>
